<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeFlow</title>
    <link rel="stylesheet" href="timer.css">
    <script src="timer.js" defer></script>
    <script src="https://kit.fontawesome.com/a1c3cab7ae.js" crossorigin="anonymous"></script>
</head>
<body>

    <div class="bg-container">
        <h1 class="name">Time<span class="span-heading">Flow</span></h1>
        <div class="timer-stopwatch-container">
            <div class="selection-container">
                <button id="stopwatchBtn" class="selection-btn1 active" onclick="showStopwatch()">Stopwatch</button>
                <button id="timerBtn" class="selection-btn2" onclick="showTimer()">Timer</button>
            </div>
            <section id="stopwatch-section">
                <div class="stopwatch-container">
                    <p class="stopwatch-text">
                        <span id="hrs">00</span>:<span id="mins">00</span>:<span id="secs">00</span></p>
                    <hr/>
                    <div style="margin-top: 15px;">
                        <button id="startStopwatchBtn" class="btn-start" onclick="startStopwatch()"><i class="fa-solid fa-play"></i><span class="stopwatch-btn-span" id="resumeText">Start</span></button>
                        <button id="pauseStopwatchBtn" class="btn-pause" onclick="pauseStopwatch()"><i class="fa-solid fa-pause"></i><span class="stopwatch-btn-span">Pause</span></button>
                        <button id="resetStopwatchBtn" class="btn-reset" onclick="resetStopwatch()"><i class="fa-solid fa-redo"></i><span class="stopwatch-btn-span">Reset</span></button>
                    </div>
                </div>
            </section>
            <section id="timer-section" style="display: none;">
                    <div class="timer-container">
                        <div class="set-timer-container">
                            <p id="inputs-ele">
                            <input type="number" id="timerHrsInput" class="timer-input" placeholder="HH" min="0">
                            <span class="timer-span">:</span>
                            <input type="number" id="timerMinsInput" class="timer-input" placeholder="MM" min="0" max="59">
                            <span class="timer-span">:</span>
                            <input type="number" id="timerSecsInput" class="timer-input" placeholder="SS" min="0" max="59">
                            </p>
                            <p id="display" class="stopwatch-text" style="display: none;">
                                <span id="timerHrsDisplay">00</span>:<span id="timerMinsDisplay">00</span>:<span id="timerSecsDisplay">00</span>
                            </p>
                        </div>
                        <br/>
                        <hr/>
                        <div class="timer-btns-container">
                            <button id="startTimerBtn" class="btn-start" onclick="startTimer()"><i class="fa-solid fa-bell"></i><span class="timer-btn-span" id="startTimerText">Start</span></button>
                            <button id="pauseTimerBtn" class="btn-pause" onclick="pauseTimer()"><i class="fa-solid fa-pause"></i><span class="timer-btn-span">Pause</span></button>
                            <button style="display: none;" id="resumeTimerBtn" class="btn-start" onclick="resumeTimer()"><i class="fa-solid fa-play"></i><span class="timer-btn-span">Resume</span></button>
                            <button id="resetTimerBtn" class="btn-reset" onclick="resetTimer()"><i class="fa-solid fa-redo"></i><span class="timer-btn-span">Reset</span></button>
                        </div>
                    </div>
                </section>
            </section>
        </div>
        <p class="my-name">Developed By Yaswanth Reddy</p>
        <h1 class="follow-heading">Let’s connect </h1>
        <div class="social-media-container">
            <a href="https://www.linkedin.com/in/yaswanth233/" target="_blank"><i class="fa-brands fa-linkedin social-media"></i></a>
            <a href="https://github.com/yaswanthr233" target="_blank"><i class="fa-brands fa-github social-media"></i></a>
            <a href="https://x.com/yaswanthr233" target="_blank"><i class="fa-brands fa-square-twitter social-media"></i></a>
            <a href="https://www.instagram.com/yaswanthr233/" target="_blank"><i class="fa-brands fa-square-instagram social-media"></i></a>
            <a href="mailto:yaswanthr233@gmail.com" target="_blank"><i class="fa-solid fa-envelope social-media"></i></a>
        </div>
    </div>
    
</body>
</html>
